# App-of-Apps for platform addons. Syncs every Application manifest under
# gitops/addons/ (cert-manager, metrics-server, monitoring, ...).
# Sync wave -1 ensures addons land before workloads (wave 0+).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: addons
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: platform
  source:
    repoURL: "https://github.com/olayori/platform.git"
    targetRevision: master
    path: gitops/addons
    directory:
      recurse: true
  destination:
    server: "https://kubernetes.default.svc"
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
