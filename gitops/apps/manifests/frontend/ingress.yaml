# Single internet-facing ALB fronting the whole demo:
#   /api/hello -> service-a   /api/time -> service-b   / -> frontend
# EKS Auto Mode provisions and manages the ALB from these annotations.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: platform
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/healthcheck-path: /healthz
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /api/hello
            pathType: Prefix
            backend:
              service:
                name: service-a
                port:
                  number: 80
          - path: /api/time
            pathType: Prefix
            backend:
              service:
                name: service-b
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
