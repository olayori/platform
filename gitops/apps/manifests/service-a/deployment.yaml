apiVersion: apps/v1
kind: Deployment
metadata:
  name: service-a
  labels:
    app.kubernetes.io/name: service-a
    app.kubernetes.io/part-of: adowol-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: service-a
  template:
    metadata:
      labels:
        app.kubernetes.io/name: service-a
        app.kubernetes.io/part-of: adowol-platform
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: service-a
          image: service-a # overwritten by kustomization.yaml (CI sets the ECR tag)
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 250m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
