apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - hpa.yaml
  - pdb.yaml

# CI rewrites newName + newTag via `kustomize edit set image` on every push to
# main. Until the first CI run, the placeholder below is not pullable and the
# pod will ImagePullBackOff — this is expected for a fresh cluster.
images:
  - name: service-a
    newName: 000000000000.dkr.ecr.us-east-1.amazonaws.com/adowol-dev/service-a
    newTag: initial
