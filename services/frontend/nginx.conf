# nginx server config for the static frontend.
# Runs unprivileged: listens on 8080, pid and temp paths under /tmp.
# This file is mounted as a conf.d server block; the unprivileged base
# image's main nginx.conf already sets `pid /tmp/nginx.pid` and includes
# conf.d/*.conf inside the http {} block.

server {
    listen 8080;
    listen [::]:8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json;
    gzip_min_length 256;

    # Keep nginx's writable temp paths off the read-only app filesystem.
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Kubernetes liveness/readiness probe target.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 'ok';
    }

    # SPA-style routing: fall back to index.html for unknown paths.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
