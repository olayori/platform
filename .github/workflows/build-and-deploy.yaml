name: Build & Deploy

# On push to master: build & push images to ECR (keyless via OIDC), then bump the
# image tag in the GitOps manifests. Argo CD does the actual deploy by reconciling
# the committed tag — this workflow never touches the cluster.
on:
  push:
    branches: [master]
  # Manually force a build/push even when no files changed — needed to bootstrap
  # a service whose ECR repo is still empty (the path filter would otherwise skip it).
  workflow_dispatch:
    inputs:
      services:
        description: "Services to build/push: 'all' or space-separated names (service-a service-b frontend)"
        default: "all"
        type: string

# Serialize runs so the GitOps tag-bump commits don't race.
concurrency:
  group: build-and-deploy
  cancel-in-progress: false

permissions:
  contents: write # to commit the image-tag bump back to the repo
  id-token: write # to request the OIDC token for AWS

# ---------------------------------------------------------------------------
# All configuration lives here as local environment variables — no GitHub
# repository secrets or variables are used. These values are not sensitive
# (an IAM role ARN and an ECR registry are public identifiers; the OIDC trust
# policy is what actually authorizes the role). Edit AWS_ACCOUNT_ID for your
# account; the rest match the Terraform foundation layer's naming.
# ---------------------------------------------------------------------------
env:
  AWS_ACCOUNT_ID: "381492057134" # <-- set to your AWS account ID
  AWS_REGION: us-east-1
  ECR_NAMESPACE: adowol-dev # = "${name_prefix}-${environment}" repo prefix
  CI_ROLE_NAME: adowol-dev-github-actions-ci # = foundation github_ci role name

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      service-a: ${{ steps.decide.outputs.service-a }}
      service-b: ${{ steps.decide.outputs.service-b }}
      frontend: ${{ steps.decide.outputs.frontend }}
      any: ${{ steps.decide.outputs.any }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            service-a:
              - 'services/service-a/**'
            service-b:
              - 'services/service-b/**'
            frontend:
              - 'services/frontend/**'
      # On a manual run, build the requested services (default all), ignoring the
      # path filter. On push, fall back to what changed.
      - name: Decide which services to build
        id: decide
        env:
          DISPATCH: ${{ github.event_name == 'workflow_dispatch' }}
          REQUESTED: ${{ inputs.services }}
          F_service_a: ${{ steps.filter.outputs.service-a }}
          F_service_b: ${{ steps.filter.outputs.service-b }}
          F_frontend: ${{ steps.filter.outputs.frontend }}
        run: |
          set -euo pipefail
          a=false; b=false; f=false
          if [ "$DISPATCH" = "true" ]; then
            req="${REQUESTED:-all}"
            if [ "$req" = "all" ]; then
              a=true; b=true; f=true
            else
              for s in $req; do
                case "$s" in
                  service-a) a=true ;;
                  service-b) b=true ;;
                  frontend)  f=true ;;
                  *) echo "Unknown service: $s" >&2; exit 1 ;;
                esac
              done
            fi
          else
            [ "${F_service_a:-false}" = "true" ] && a=true || true
            [ "${F_service_b:-false}" = "true" ] && b=true || true
            [ "${F_frontend:-false}" = "true" ] && f=true || true
          fi
          any=false
          { [ "$a" = true ] || [ "$b" = true ] || [ "$f" = true ]; } && any=true || true
          {
            echo "service-a=$a"
            echo "service-b=$b"
            echo "frontend=$f"
            echo "any=$any"
          } >> "$GITHUB_OUTPUT"
          echo "Build set -> service-a=$a service-b=$b frontend=$f (any=$any)"

  build-push:
    needs: changes
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [service-a, service-b, frontend]
    steps:
      - name: Skip unchanged service
        id: gate
        run: echo "build=${{ needs.changes.outputs[matrix.service] }}" >> "$GITHUB_OUTPUT"

      - if: steps.gate.outputs.build == 'true'
        uses: actions/checkout@v4

      - if: steps.gate.outputs.build == 'true'
        name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/${{ env.CI_ROLE_NAME }}
          aws-region: ${{ env.AWS_REGION }}

      - if: steps.gate.outputs.build == 'true'
        name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - if: steps.gate.outputs.build == 'true'
        uses: docker/setup-buildx-action@v3

      - if: steps.gate.outputs.build == 'true'
        name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_NAMESPACE }}/${{ matrix.service }}:sha-${{ github.sha }}
          build-args: VERSION=sha-${{ github.sha }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  bump-gitops:
    needs: [changes, build-push]
    if: ${{ needs.changes.outputs.any == 'true' }}
    runs-on: ubuntu-latest
    steps:
      # No token: needed — checkout uses the runner's built-in GITHUB_TOKEN and
      # persists it for the later `git push`. Nothing is read from the secret store.
      - uses: actions/checkout@v4

      - name: Install kustomize
        run: |
          curl -sSfL "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump image tags for changed services
        env:
          REGISTRY: ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          TAG: sha-${{ github.sha }}
        run: |
          set -euo pipefail
          bumped=0
          # Per-service change flags (matrix-style indexing isn't available in run steps):
          declare -A CHANGED=(
            [service-a]="${{ needs.changes.outputs.service-a }}"
            [service-b]="${{ needs.changes.outputs.service-b }}"
            [frontend]="${{ needs.changes.outputs.frontend }}"
          )
          for svc in service-a service-b frontend; do
            if [ "${CHANGED[$svc]}" = "true" ]; then
              echo "Bumping $svc -> $REGISTRY/$ECR_NAMESPACE/$svc:$TAG"
              (cd "gitops/apps/manifests/$svc" && \
                kustomize edit set image "$svc=$REGISTRY/$ECR_NAMESPACE/$svc:$TAG")
              bumped=1
            fi
          done
          echo "bumped=$bumped" >> "$GITHUB_ENV"

      - name: Commit & push tag bump
        if: env.bumped == '1'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gitops/apps/manifests
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "ci: deploy ${GITHUB_SHA::7} [skip ci]"
          git push origin HEAD:master
